<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RR Assistant — Ridgefield Resistance</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f1a;color:#e5e7eb;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* ── HEADER ── */
  #header{background:#1a1a2e;border-bottom:1px solid #2d2d44;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .logo{width:38px;height:38px;background:#dc2626;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:white;flex-shrink:0}
  .header-title{font-size:15px;font-weight:700;color:#f3f4f6;margin-left:10px}
  .header-sub{font-size:11px;color:#9ca3af;margin-left:10px}
  .header-left{display:flex;align-items:center}
  #status-dot{width:8px;height:8px;border-radius:50%;background:#6b7280;flex-shrink:0}
  #status-dot.online{background:#22c55e}
  #status-dot.loading{background:#f59e0b;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── PASSPHRASE GATE ── */
  #gate{position:fixed;inset:0;background:#0f0f1a;display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
  .gate-card{background:#1a1a2e;border:1px solid #2d2d44;border-radius:16px;padding:32px 28px;max-width:380px;width:100%;text-align:center}
  .gate-logo{width:56px;height:56px;background:#dc2626;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:white;margin:0 auto 16px}
  .gate-card h2{font-size:20px;font-weight:700;color:#f3f4f6;margin-bottom:6px}
  .gate-card p{font-size:13px;color:#9ca3af;margin-bottom:20px;line-height:1.5}
  #gate-input{width:100%;background:#0f0f1a;border:1px solid #374151;border-radius:8px;padding:10px 14px;color:#f3f4f6;font-size:14px;text-align:center;outline:none;margin-bottom:12px}
  #gate-input:focus{border-color:#dc2626}
  #gate-btn{width:100%;background:#dc2626;color:white;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
  #gate-btn:hover{background:#b91c1c}
  #gate-error{font-size:12px;color:#f87171;margin-top:8px;display:none}

  /* ── MESSAGES ── */
  #chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  #chat-area::-webkit-scrollbar{width:4px}
  #chat-area::-webkit-scrollbar-track{background:transparent}
  #chat-area::-webkit-scrollbar-thumb{background:#374151;border-radius:4px}

  .msg{display:flex;gap:10px;max-width:90%}
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg.bot{align-self:flex-start}
  .msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-top:2px}
  .msg.bot .msg-avatar{background:#dc2626;color:white}
  .msg.user .msg-avatar{background:#374151;color:#9ca3af}
  .msg-bubble{background:#1e1e35;border:1px solid #2d2d44;border-radius:12px;padding:10px 14px;font-size:14px;line-height:1.6;color:#e5e7eb}
  .msg.user .msg-bubble{background:#1e3a2f;border-color:#166534}
  .msg-bubble a{color:#60a5fa;text-decoration:underline}

  /* ── TYPING INDICATOR ── */
  .typing-indicator{display:flex;gap:4px;padding:10px 14px}
  .typing-indicator span{width:7px;height:7px;background:#6b7280;border-radius:50%;animation:bounce 1.2s infinite}
  .typing-indicator span:nth-child(2){animation-delay:.2s}
  .typing-indicator span:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

  /* ── ACTION CARDS ── */
  .action-cards-wrapper{width:100%;max-width:600px;align-self:flex-start;margin-top:4px}
  .action-cards-label{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-left:2px}
  .action-cards-scroll{display:flex;flex-direction:column;gap:8px}
  .action-card{background:#1a2535;border:1px solid #1e3a5f;border-left:3px solid #2563eb;border-radius:10px;padding:12px 14px;transition:border-color .15s}
  .action-card:hover{border-color:#3b82f6;border-left-color:#3b82f6}
  .action-card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
  .action-category{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 7px;border-radius:4px;background:#1e3a5f;color:#60a5fa}
  .action-priority-dot{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-right:4px}
  .action-priority-dot.p1{background:#ef4444;box-shadow:0 0 6px #ef444488}
  .action-priority-dot.p2{background:#eab308;box-shadow:0 0 6px #eab30888}
  .action-priority-dot.p3{background:#22c55e;box-shadow:0 0 6px #22c55e88}
  .action-priority-dot.px{background:#6b7280}
  .action-answer{font-size:13px;font-weight:600;color:#f3f4f6;margin-bottom:4px;line-height:1.4}
  .action-details{font-size:12px;color:#9ca3af;line-height:1.5;margin-bottom:8px}
  .action-link{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#60a5fa;text-decoration:none;background:#1e3a5f;padding:5px 10px;border-radius:6px;transition:background .15s}
  .action-link:hover{background:#1d4ed8;color:white}
  .action-link svg{width:12px;height:12px;flex-shrink:0}

  /* ── QUICK CHIPS ── */
  #chips{padding:8px 16px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none}
  #chips::-webkit-scrollbar{display:none}
  .chip{background:#1a1a2e;border:1px solid #374151;border-radius:20px;padding:7px 13px;font-size:12px;color:#d1d5db;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
  .chip:hover{background:#2d2d44;border-color:#6b7280;color:#f3f4f6}

  /* ── INPUT AREA ── */
  #input-area{background:#1a1a2e;border-top:1px solid #2d2d44;padding:12px 16px;flex-shrink:0}
  #input-row{display:flex;gap:10px;align-items:flex-end}
  #msg-input{flex:1;background:#0f0f1a;border:1px solid #374151;border-radius:10px;padding:10px 14px;color:#f3f4f6;font-size:14px;resize:none;outline:none;max-height:120px;font-family:inherit;line-height:1.5}
  #msg-input:focus{border-color:#dc2626}
  #msg-input::placeholder{color:#4b5563}
  #send-btn{width:38px;height:38px;background:#dc2626;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
  #send-btn:hover{background:#b91c1c}
  #send-btn:disabled{background:#374151;cursor:not-allowed}
  #footer-text{font-size:10px;color:#4b5563;text-align:center;margin-top:8px}
</style>
</head>
<body>

<!-- ═══════════════════════════════ PASSPHRASE GATE ═══════════════════════════════ -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">RR</div>
    <h2>Ridgefield Resistance</h2>
    <p>Enter your subscriber passphrase to access the civic action assistant.</p>
    <input type="password" id="gate-input" placeholder="Passphrase" onkeydown="if(event.key==='Enter')checkPass()"/>
    <button id="gate-btn" onclick="checkPass()">Enter</button>
    <p id="gate-error">Incorrect passphrase. Try again.</p>
  </div>
</div>

<!-- ═══════════════════════════════ MAIN UI ═══════════════════════════════ -->
<div id="header">
  <div class="header-left">
    <div class="logo">RR</div>
    <div>
      <div class="header-title" id="header-title">RR Assistant</div>
      <div class="header-sub" id="header-sub">Ridgefield Resistance</div>
    </div>
  </div>
  <div id="status-dot" title="Status"></div>
</div>

<div id="chat-area"></div>

<div id="chips">
  <button class="chip" onclick="fillInput('What is Ridgefield Resistance?')">What is Ridgefield Resistance?</button>
  <button class="chip" onclick="fillInput('Who represents me in Congress?')">Who represents me in Congress?</button>
  <button class="chip" onclick="fillInput('What events are coming up?')">What events are coming up?</button>
  <button class="chip" onclick="fillInput('What actions can I take this week?')">What actions can I take this week?</button>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="msg-input" placeholder="Ask about officials, events, or how to take action..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
      oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMsg()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="18" height="18">
        <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
      </svg>
    </button>
  </div>
  <p id="footer-text">Ridgefield Resistance · Your guide to local civic action</p>
</div>

<script>
// ══════════════════════════════════════════════════════════
// CONFIGURATION
// ══════════════════════════════════════════════════════════
const SHEET_ID = '2PACX-1vTAjCDJgmQZ53MYc9GUh7y43rmLTQMTC3S7-3hj_VH43MBz6YQ1R21Njt7K7RrWPWLnGX8XhBZsQBrO';
const BASE     = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub`;
const GIDS     = {
  officials : '0',
  events    : '548359545',
  faqs      : '724535814',
  resources : '1538934812',
  config    : '1839270458',
  actions   : '925414627'   // ← NEW: Actions tab
};
const SESSION_ID = 'sess-' + Math.random().toString(36).substring(2, 10);
const CHAT_FN    = '/.netlify/functions/chat';

let sheetData = {}, cfg = {}, msgs = [], qCount = 0, maxQ = 10, busy = false;
let activeActions = []; // filtered, live actions

// ══════════════════════════════════════════════════════════
// CSV PARSING
// ══════════════════════════════════════════════════════════
function csvUrl(gid){ return `${BASE}?gid=${gid}&single=true&output=csv`; }

function splitLine(line){
  const res=[]; let cur=''; let q=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){q=!q;}
    else if(line[i]===',' && !q){res.push(cur);cur='';}
    else cur+=line[i];
  }
  res.push(cur); return res;
}

function parseCSV(text){
  const lines = text.split('\n');
  if(lines.length < 2) return [];
  const headers = splitLine(lines[0]).map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = splitLine(line);
    const obj = {};
    headers.forEach((h,j) => { obj[h] = (vals[j]||'').replace(/"/g,'').trim(); });
    return obj;
  });
}

// ══════════════════════════════════════════════════════════
// ACTIONS FILTER — Active=True AND not expired
// ══════════════════════════════════════════════════════════
function parseMMDDYYYY(str){
  if(!str) return null;
  const parts = str.trim().split('/');
  if(parts.length !== 3) return null;
  const [m, d, y] = parts;
  return new Date(parseInt(y), parseInt(m)-1, parseInt(d));
}

function getCol(row, name){
  // Case-insensitive, whitespace-tolerant column lookup
  const k = Object.keys(row).find(c => c.toLowerCase().trim() === name.toLowerCase());
  return k ? (row[k]||'').trim() : '';
}

function isActionLive(row){
  const activeVal = getCol(row, 'active').toLowerCase();
  if(activeVal !== 'true') return false;
  const expStr = getCol(row, 'expires date') || getCol(row, 'expires_date');
  const exp = parseMMDDYYYY(expStr);
  if(exp){
    const today = new Date();
    today.setHours(0,0,0,0);
    if(exp < today) return false;
  }
  return true;
}

function getActiveActions(all){
  return all
    .filter(isActionLive)
    .sort((a,b) => {
      const pa = parseInt(getCol(a,'priority')) || 999;
      const pb = parseInt(getCol(b,'priority')) || 999;
      return pa - pb;
    });
}

// ══════════════════════════════════════════════════════════
// SHEET LOADING
// ══════════════════════════════════════════════════════════
async function loadSheets(){
  setStatus('loading');
  const entries = await Promise.allSettled(
    Object.entries(GIDS).map(([k,gid]) =>
      fetch(csvUrl(gid)).then(r => r.text()).then(t => [k, parseCSV(t)])
    )
  );
  entries.forEach(e => {
    if(e.status === 'fulfilled') sheetData[e.value[0]] = e.value[1];
  });
  cfg = {};
  (sheetData.config||[]).forEach(r => {
    const cols = Object.keys(r);
    if(cols.length < 2) return;
    // Support both naming conventions: setting_key/setting_value OR key/value
    const keyCol = cols.find(c => c.toLowerCase() === 'setting_key' || c.toLowerCase() === 'key');
    const valCol = cols.find(c => c.toLowerCase() === 'setting_value' || c.toLowerCase() === 'value');
    if(keyCol && valCol){
      const k = (r[keyCol]||'').trim();
      const v = (r[valCol]||'').trim();
      if(k) cfg[k] = v;
      return;
    }
    // Fallback: treat first col as key, second as value
    const k = (r[cols[0]]||'').trim();
    const v = (r[cols[1]]||'').trim();
    if(k) cfg[k] = v;
  });
  activeActions = getActiveActions(sheetData.actions || []);

  // ── DIAGNOSTICS (remove after confirmed working) ──────────
  console.log('=== RESISTCHAT DIAGNOSTICS ===');
  console.log('Tabs loaded:', Object.keys(sheetData));
  console.log('Config chatbot_name:', cfg['chatbot_name']);
  console.log('Config subscriber_passphrase:', cfg['subscriber_passphrase']);
  const rawActions = sheetData.actions || [];
  console.log('Raw actions row count:', rawActions.length);
  if(rawActions[0]){
    console.log('Actions column headers:', Object.keys(rawActions[0]));
    console.log('First raw action row:', rawActions[0]);
  }
  rawActions.forEach((r,i) => {
    const activeCol = Object.keys(r).find(k => k.toLowerCase().trim() === 'active');
    const activeVal = activeCol ? r[activeCol] : '(column not found)';
    console.log(`Row ${i}: Active col="${activeCol}" val="${activeVal}" → live=${isActionLive(r)}`);
  });
  console.log('activeActions after filter:', activeActions.length);
  console.log('==============================');
  // ──────────────────────────────────────────────────────────

  // Apply config to UI
  if(cfg['chatbot_name'])
    document.getElementById('header-title').textContent = cfg['chatbot_name'];
  if(cfg['org_name'])
    document.getElementById('header-sub').textContent = cfg['org_name'];
  setStatus('online');
  return true;
}

// ══════════════════════════════════════════════════════════
// PASSPHRASE GATE
// ══════════════════════════════════════════════════════════
async function checkPass(){
  const val = document.getElementById('gate-input').value.trim();
  if(!val) return;

  // If sheets haven't loaded yet, wait for them
  if(!Object.keys(sheetData).length){
    document.getElementById('gate-btn').textContent = 'Loading...';
    document.getElementById('gate-btn').disabled = true;
    await loadSheets();
    document.getElementById('gate-btn').textContent = 'Enter';
    document.getElementById('gate-btn').disabled = false;
  }

  // Passphrase check — fully case-insensitive both directions
  const stored = (cfg['subscriber_passphrase'] || 'RESISTANCE2026').trim();
  if(val.trim().toUpperCase() === stored.toUpperCase()){
    document.getElementById('gate').style.display = 'none';
    addBotMsg(cfg['chatbot_welcome_message'] || cfg['welcome_message'] || 'Welcome to Ridgefield Resistance. How can I help you take action today?');
    renderActionCards();
  } else {
    document.getElementById('gate-error').style.display = 'block';
  }
}

// ══════════════════════════════════════════════════════════
// STATUS DOT
// ══════════════════════════════════════════════════════════
function setStatus(s){ document.getElementById('status-dot').className = s; }

// ══════════════════════════════════════════════════════════
// CONTEXT BUILDER
// ══════════════════════════════════════════════════════════
function buildContext(){
  const today = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const orgName = cfg['org_name'] || 'Ridgefield Resistance';
  const geoFocus = cfg['geographic_focus'] || 'Ridgefield, CT';
  const outOfScope = cfg['out_of_scope_response'] || "That's outside my focus area.";
  let ctx = `You are ${cfg['chatbot_name']||'RR Assistant'}, the civic action chatbot for ${orgName}. Today is ${today}.\nGeographic focus: ${geoFocus}\nOut-of-scope response to use: "${outOfScope}"\n\n`;

  if(sheetData.officials?.length){
    ctx += '## ELECTED OFFICIALS\n';
    sheetData.officials.slice(0,20).forEach(r => {
      if(r['First Name']||r['first_name']){
        const fn = r['First Name']||r['first_name']||'';
        const ln = r['Last Name']||r['last_name']||'';
        const ti = r['Title']||r['title']||'';
        const ph = r['Phone']||r['phone']||'';
        const em = r['Email']||r['email']||'';
        ctx += `- ${ti} ${fn} ${ln}${ph?' | '+ph:''}${em?' | '+em:''}\n`;
      }
    });
    ctx += '\n';
  }

  const now = new Date();
  const upcomingEvents = (sheetData.events||[]).filter(r => {
    if(!r['Date']&&!r['Start Date']) return false;
    const d = parseMMDDYYYY(r['Date']||r['Start Date']);
    return d && d >= now;
  }).slice(0,10);
  if(upcomingEvents.length){
    ctx += '## UPCOMING EVENTS\n';
    upcomingEvents.forEach(r => {
      ctx += `- ${r['Event']||r['Title']||r['Name']||'Event'} | ${r['Date']||r['Start Date']||''} | ${r['Location']||''} | ${r['Description']||r['Details']||''}\n`;
    });
    ctx += '\n';
  }

  if(sheetData.faqs?.length){
    ctx += '## FREQUENTLY ASKED QUESTIONS\n';
    sheetData.faqs.forEach(r => {
      const q = r['Question']||r['C']||'';
      const a = r['Answer']||r['D']||'';
      if(q&&a) ctx += `Q: ${q}\nA: ${a}\n\n`;
    });
  }

  if(sheetData.resources?.length){
    ctx += '## RESOURCES & LINKS\n';
    sheetData.resources.slice(0,15).forEach(r => {
      const label = r['Label']||r['Title']||r['Name']||'';
      const url   = r['URL']||r['Link']||'';
      const desc  = r['Description']||r['Details']||'';
      if(label) ctx += `- ${label}${url?' ('+url+')':''}${desc?' — '+desc:''}\n`;
    });
    ctx += '\n';
  }

  if(activeActions.length){
    ctx += '## CURRENT ACTIONS (reference these when relevant)\n';
    activeActions.forEach(r => {
      ctx += `- [${r['Category']||'Action'}] ${r['Answer']||''} | ${r['Details']||''} | Urgency: ${r['Urgency']||'Normal'}\n`;
    });
    ctx += '\n';
  }

  ctx += `Answer questions helpfully and concisely. Use the data above. When suggesting actions, prioritize Current Actions listed above. Stay within the geographic focus. If you don't know something, say so honestly.`;
  return ctx;
}

// ══════════════════════════════════════════════════════════
// ACTION CARDS RENDERER
// ══════════════════════════════════════════════════════════
function getPriority(r){
  return getCol(r, 'priority');
}

function priorityDot(p){
  const n = parseInt(p, 10);
  if(n === 1) return `<span class="action-priority-dot p1" title="Priority 1"></span>`;
  if(n === 2) return `<span class="action-priority-dot p2" title="Priority 2"></span>`;
  if(n === 3) return `<span class="action-priority-dot p3" title="Priority 3"></span>`;
  return `<span class="action-priority-dot px" title="Priority ${p||'?'}"></span>`;
}

function renderActionCards(){
  if(!activeActions.length) return;
  if(activeActions[0]){
    const keys = Object.keys(activeActions[0]);
    console.log('Actions columns:', keys);
    keys.forEach(k => {
      if(k.toLowerCase().includes('prior'))
        console.log(`  Priority column: "${k}" = "${activeActions[0][k]}"`);
    });
    console.log('First row full:', activeActions[0]);
  }
  const wrapper = document.createElement('div');
  wrapper.className = 'action-cards-wrapper';
  wrapper.innerHTML = `<div class="action-cards-label">📣 Take Action Now</div><div class="action-cards-scroll"></div>`;
  const scroll = wrapper.querySelector('.action-cards-scroll');
  activeActions.forEach(r => {
    const p         = getPriority(r);
    const pn        = parseInt(p, 10);
    const borderCol = pn===1 ? '#ef4444' : pn===2 ? '#eab308' : pn===3 ? '#22c55e' : '#2563eb';
    const hasLink   = r['Link'] && r['Link'].trim();
    const linkLabel = r['Link_Label'] || r['Link Label'] || 'Take Action';
    console.log(`  Card p="${p}" pn=${pn} border=${borderCol}`);
    const card = document.createElement('div');
    card.className = 'action-card';
    card.style.borderLeftColor = borderCol;
    card.innerHTML = `
      <div class="action-card-header">
        ${priorityDot(p)}
        ${r['Category'] ? `<span class="action-category">${escHtml(r['Category'])}</span>` : ''}
      </div>
      <div class="action-answer">${escHtml(r['Answer'] || '')}</div>
      ${r['Details'] ? `<div class="action-details">${escHtml(r['Details'])}</div>` : ''}
      ${hasLink ? `<a class="action-link" href="${escHtml(r['Link'])}" target="_blank" rel="noopener">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
        ${escHtml(linkLabel)}
      </a>` : ''}
    `;
    scroll.appendChild(card);
  });
  document.getElementById('chat-area').appendChild(wrapper);
  scrollBottom();
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════════
// CHAT MESSAGING
// ══════════════════════════════════════════════════════════
function addBotMsg(text){
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `
    <div class="msg-avatar">RR</div>
    <div class="msg-bubble">${formatMsgText(text)}</div>
  `;
  document.getElementById('chat-area').appendChild(div);
  scrollBottom();
}

function addUserMsg(text){
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `
    <div class="msg-avatar">You</div>
    <div class="msg-bubble">${escHtml(text)}</div>
  `;
  document.getElementById('chat-area').appendChild(div);
  scrollBottom();
}

function formatMsgText(text){
  return escHtml(text)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/\n/g,'<br>');
}

function addTypingIndicator(){
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `
    <div class="msg-avatar">RR</div>
    <div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
  `;
  document.getElementById('chat-area').appendChild(div);
  scrollBottom();
}

function removeTypingIndicator(){
  const el = document.getElementById('typing');
  if(el) el.remove();
}

function scrollBottom(){
  const ca = document.getElementById('chat-area');
  ca.scrollTop = ca.scrollHeight;
}

function fillInput(text){
  document.getElementById('msg-input').value = text;
  document.getElementById('msg-input').focus();
}

function autoResize(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ══════════════════════════════════════════════════════════
// SEND MESSAGE
// ══════════════════════════════════════════════════════════
async function sendMsg(){
  if(busy) return;
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if(!text) return;

  if(qCount >= maxQ){
    addBotMsg("You've reached the session limit. Please refresh to start a new session.");
    return;
  }

  inp.value = '';
  inp.style.height = 'auto';
  busy = true;
  document.getElementById('send-btn').disabled = true;

  addUserMsg(text);
  msgs.push({ role:'user', content: text });
  addTypingIndicator();
  setStatus('loading');

  // Collect active action IDs to log
  const actionIds = activeActions.map(r => r['ID']||r['id']||'').filter(Boolean).join(',');

  try {
    const res = await fetch(CHAT_FN, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({
        session_id       : SESSION_ID,
        messages         : msgs,
        system_context   : buildContext(),
        action_served    : actionIds   // ← NEW: passes to logger
      })
    });
    const data = await res.json();
    removeTypingIndicator();

    if(data.error){
      addBotMsg('Sorry, something went wrong. Please try again.');
    } else {
      const reply = data.content?.[0]?.text || 'No response received.';
      msgs.push({ role:'assistant', content: reply });
      addBotMsg(reply);
      renderActionCards(); // ← proactive: show actions after EVERY response
      qCount++;
    }
  } catch(err){
    removeTypingIndicator();
    addBotMsg('Connection error. Please check your connection and try again.');
    console.error(err);
  }

  setStatus('online');
  busy = false;
  document.getElementById('send-btn').disabled = false;
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
window.addEventListener('load', async () => {
  await loadSheets();
  document.getElementById('gate-input').focus();
});
</script>
